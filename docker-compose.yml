services:
  emby-wrapped:
    image: ghcr.io/ctznsniiips/emby-wrapped-ftp:latest
    container_name: emby-wrapped
    ports:
      - "8056:3000"
    environment:
      - NODE_ENV=production
      - EMBY_URL=${EMBY_URL}
      - EMBY_API_KEY=${EMBY_API_KEY}
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - PUBLIC_URL=${PUBLIC_URL:-}
      - CACHE_TTL=${CACHE_TTL:-86400}
      - ANALYTICS_SCRIPT=${ANALYTICS_SCRIPT:-}
      - FILTER_USER_ID=${FILTER_USER_ID:-}
      - SEERR_URL=${SEERR_URL:-}
      - SEERR_API_KEY=${SEERR_API_KEY:-}
    volumes:
      # Mount custom music files (optional)
      - ./music:/app/static/music:ro
    restart: unless-stopped
    # Security: Read-only root filesystem
    read_only: true
    # Security: Drop all capabilities
    cap_drop:
      - ALL
    # Security: No new privileges
    security_opt:
      - no-new-privileges:true
    # Tmpfs for writable directories needed by Node
    tmpfs:
      - /tmp:noexec,nosuid,nodev
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O", "/dev/null", "http://localhost:3000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
